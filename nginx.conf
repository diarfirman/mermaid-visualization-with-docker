events {}

http {
    server {
        listen 4443 ssl;
        server_name drfmermaid.duckdns.org;

        ssl_certificate /etc/nginx/certs/duckdns_fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/duckdns_privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            proxy_pass http://mermaid:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            sub_filter '</body>' '<script src="/static/actions.js"></script></body>';
            sub_filter_once on;
        }
    }

    server {
        listen 4443 ssl;
        server_name drfmermaid.abrdns.com;

        ssl_certificate /etc/nginx/certs/abrdns_fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/abrdns_privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            proxy_pass http://mermaid:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            sub_filter '</body>' '<script src="/static/actions.js"></script></body>';
            sub_filter_once on;
        }
    }
}
